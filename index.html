<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>POS_System</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <link rel="scriptsheet" href="script.js">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tac+One&display=swap" rel="stylesheet">


    <style>

    </style>
</head>
<body>

<div class="app-wrapper">

    <div class="calculator-card">

        <div class="display-area">
            <div id="previous-display"></div>
            <div id="current-display">0</div>
        </div>

        <div class="buttons-grid">

            <button class="btn clear-btn" onclick="clearAll()">AC</button>
            <button class="btn operator-btn" onclick="setOperator('/')">÷</button>

            <button class="btn" onclick="addNumber('7')">7</button>
            <button class="btn" onclick="addNumber('8')">8</button>
            <button class="btn" onclick="addNumber('9')">9</button>
            <button class="btn operator-btn" onclick="setOperator('*')">×</button>

            <button class="btn" onclick="addNumber('4')">4</button>
            <button class="btn" onclick="addNumber('5')">5</button>
            <button class="btn" onclick="addNumber('6')">6</button>
            <button class="btn operator-btn" onclick="setOperator('-')">−</button>

            <button class="btn" onclick="addNumber('1')">1</button>
            <button class="btn" onclick="addNumber('2')">2</button>
            <button class="btn" onclick="addNumber('3')">3</button>
            <button class="btn operator-btn" onclick="setOperator('+')">+</button>

            <button class="btn zero-btn" onclick="addNumber('0')">0</button>
            <button class="btn" onclick="addDot()">.</button>
            <button class="btn equal-btn" onclick="calculateResult()">=</button>

        </div>

    </div>

</div>
<script src="script.js"></script>
<script src="assets/lib/jquery-4.0.0.min.js"></script>
</body>
</html>
