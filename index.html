<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>POS_System</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <link rel="scriptsheet" href="script.js">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tac+One&display=swap" rel="stylesheet">


    <style>

    </style>
</head>
<body>

<div class="app-container">

    <div class="calculator-container">
        <div class="calculator-display">
            <div class="expression-display"></div>
            <div class="result-display"></div>
        </div>

        <div class="button-grid">
            <button onclick="clearAll()">C</button>
            <button onclick="selectOperator('/')">/</button>
            <button onclick="enterNumber('7')">7</button>
            <button onclick="enterNumber('8')">8</button>
            <button onclick="enterNumber('8')">9</button>

            <button onclick="selectOperator('*')">x</button>
            <button onclick="enterNumber('4')">4</button>
            <button onclick="enterNumber('5')">5</button>
            <button onclick="enterNumber('6')">6</button>

            <button onclick="selectOperator('-')">-</button>
            <button onclick="enterNumber('1')">1</button>
            <button onclick="enterNumber('2')">2</button>
            <button onclick="enterNumber('3')">3</button>

            <button onclick="selectOperator('+')">+</button>
            <button onclick="enterNumber('0')">0</button>
            <button onclick="addDecimal()">.</button>
            <button onclick="calculateResult()">=</button>
        </div>
    </div>
</div>


<script src="script.js"></script>
<script src="assets/lib/jquery-4.0.0.min.js"></script>
</body>
</html>
